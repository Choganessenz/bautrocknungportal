<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeutoPlus – Mitarbeiterportal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #1B2B5E;
      --secondary: #3A7EC6;
      --text:      #111827;
      --gray:      #6B7280;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      height: 100%;
      overflow: hidden;
      /* iOS: verhindert Bounce-Scroll / Overscroll */
      position: fixed;
      width: 100%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    /* ── Video ── */
    #splash {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #logo-video {
      /* Original 800×177 px – auf kleinen Screens proportional schrumpfen */
      width: min(800px, 88vw);
      height: auto;
      transition: opacity 0.8s ease;
    }

    /* ── Login-Karte ── */
    #login-card {
      position: absolute;
      width: min(340px, 88vw);
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(27, 43, 94, 0.13);
      padding: 40px 36px 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #login-card.visible {
      opacity: 1;
      pointer-events: all;
    }

    @media (max-width: 400px) {
      #login-card { padding: 30px 22px 26px; }
    }

    .logo-text {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-text span {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
    }

    #login-card h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.78rem;
      color: var(--gray);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.4;
    }

    .field { margin-bottom: 15px; }

    .field label {
      display: block;
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      font-size: 16px; /* 16px verhindert Auto-Zoom auf iOS */
      color: var(--text);
      background: #F9FAFB;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    .field input:focus {
      border-color: var(--secondary);
      background: #fff;
    }

    #login-btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s;
      appearance: none;
      -webkit-appearance: none;
      touch-action: manipulation;
    }

    #login-btn:hover  { background: var(--secondary); }
    #login-btn:active { opacity: 0.85; }

    .divider {
      height: 1px;
      background: #E5E7EB;
      margin: 20px 0 16px;
    }

    .footer-note {
      font-size: 0.7rem;
      color: var(--gray);
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="splash">
    <!--
      autoplay + muted + playsinline = iOS-Autoplay erlaubt
      preload=auto = so früh wie möglich laden
    -->
    <video id="logo-video" autoplay muted playsinline preload="auto">
      <!-- Safari / iOS: HEVC mit Alpha -->
      <source src="Material/logo_alpha_safari.mov" type="video/quicktime">
      <!-- Chrome / Firefox / Android: VP9 mit Alpha -->
      <source src="Material/Text-Teutoplus Logo 3_1_alpha.webm" type="video/webm; codecs=vp9">
    </video>
  </div>

  <div id="login-card">
    <div class="logo-text"><span>Mitarbeiterportal</span></div>
    <h1>Willkommen zurück</h1>
    <p class="subtitle">TeutoPlus Bautrocknung OWL GmbH</p>

    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label for="username">Benutzername</label>
        <input id="username" type="text" placeholder="Vorname Nachname"
               autocomplete="username" autocapitalize="words" required>
      </div>
      <div class="field">
        <label for="password">Passwort</label>
        <input id="password" type="password" placeholder="••••••••"
               autocomplete="current-password" required>
      </div>
      <button id="login-btn" type="submit">Anmelden</button>
    </form>

    <div class="divider"></div>
    <p class="footer-note">Nur für autorisierte Mitarbeiter</p>
  </div>

  <script>
    const video = document.getElementById('logo-video');
    const card  = document.getElementById('login-card');
    let done = false;

    function showLogin() {
      if (done) return;
      done = true;
      video.style.opacity = '0';
      setTimeout(() => {
        video.style.display = 'none';
        card.classList.add('visible');
        // Kein Auto-Focus auf Mobile (öffnet Tastatur)
        if (window.innerWidth > 600) {
          document.getElementById('username').focus();
        }
      }, 700);
    }

    // ── Normaler Ablauf ──
    video.addEventListener('ended', showLogin);

    // ── Fehler beim Laden oder Abspielen ──
    video.addEventListener('error', () => setTimeout(showLogin, 300));

    // ── Fallback A: Video startet nicht innerhalb 4 Sekunden ──
    // (tritt auf wenn kein Codec unterstützt wird oder Netz zu langsam)
    const shortFallback = setTimeout(showLogin, 4000);

    // Fallback löschen sobald Video tatsächlich läuft
    video.addEventListener('timeupdate', function cancelFallback() {
      if (video.currentTime > 0.2) {
        clearTimeout(shortFallback);
        video.removeEventListener('timeupdate', cancelFallback);
      }
    });

    // ── Fallback B: Maximale Wartezeit ──
    // Falls Video hängt oder extrem langsam – nach 10s immer anzeigen
    setTimeout(showLogin, 10000);

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Laden…';
      btn.disabled = true;
      setTimeout(() => { window.location.href = 'portal.html'; }, 600);
    }
  </script>
</body>
</html>
