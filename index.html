<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeutoPlus – Mitarbeiterportal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #1B2B5E;
      --secondary: #3A7EC6;
      --text:      #111827;
      --gray:      #6B7280;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    /* ── Video ── */
    #splash {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #logo-video {
      /* Originalgröße auf Desktop, skaliert auf Mobile */
      width: min(800px, 90vw);
      height: auto;
      transition: opacity 0.8s ease;
      /* Verhindert schwarzen Hintergrund falls Alpha nicht greift */
      mix-blend-mode: multiply;
    }

    /* ── Login-Karte ── */
    #login-card {
      position: absolute;
      width: min(340px, 90vw);
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(27, 43, 94, 0.13);
      padding: 40px 36px 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    @media (max-width: 400px) {
      #login-card { padding: 32px 24px 28px; }
    }

    #login-card.visible {
      opacity: 1;
      pointer-events: all;
    }

    .logo-text {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-text span {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
    }

    #login-card h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--gray);
      text-align: center;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }

    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      font-size: 1rem; /* verhindert iOS-Zoom bei <16px */
      color: var(--text);
      background: #F9FAFB;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    .field input:focus {
      border-color: var(--secondary);
      background: #fff;
    }

    #login-btn {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }

    #login-btn:hover  { background: var(--secondary); }
    #login-btn:active { background: var(--secondary); opacity: 0.85; }

    .divider {
      height: 1px;
      background: #E5E7EB;
      margin: 22px 0 18px;
    }

    .footer-note {
      font-size: 0.72rem;
      color: var(--gray);
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="splash">
    <video id="logo-video" muted playsinline preload="auto">
      <!-- Safari: HEVC mit Alpha (888 KB) -->
      <source src="Material/logo_alpha_safari.mov" type="video/mp4; codecs=hvc1">
      <!-- Chrome / Firefox: VP9 mit Alpha (263 KB) -->
      <source src="Material/Text-Teutoplus Logo 3_1_alpha.webm" type="video/webm; codecs=vp9">
    </video>
  </div>

  <div id="login-card">
    <div class="logo-text"><span>Mitarbeiterportal</span></div>
    <h1>Willkommen zurück</h1>
    <p class="subtitle">TeutoPlus Bautrocknung OWL GmbH</p>

    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label for="username">Benutzername</label>
        <input id="username" type="text" placeholder="Vorname Nachname"
               autocomplete="username" autocapitalize="words" required>
      </div>
      <div class="field">
        <label for="password">Passwort</label>
        <input id="password" type="password" placeholder="••••••••"
               autocomplete="current-password" required>
      </div>
      <button id="login-btn" type="submit">Anmelden</button>
    </form>

    <div class="divider"></div>
    <p class="footer-note">Nur für autorisierte Mitarbeiter</p>
  </div>

  <script>
    const video = document.getElementById('logo-video');
    const card  = document.getElementById('login-card');
    let loginShown = false;
    let fallbackTimer = null;

    function showLogin() {
      if (loginShown) return;
      loginShown = true;
      if (fallbackTimer) clearTimeout(fallbackTimer);
      video.style.opacity = '0';
      setTimeout(() => {
        video.style.display = 'none';
        card.classList.add('visible');
        // Auf Mobile kein auto-focus (öffnet Tastatur sofort)
        if (window.innerWidth > 600) {
          document.getElementById('username').focus();
        }
      }, 700);
    }

    // Video abspielen sobald genug Daten da sind → kein Stottern
    video.addEventListener('canplaythrough', () => {
      video.play().catch(() => showLogin());
    });

    video.addEventListener('ended', showLogin);
    video.addEventListener('error', showLogin);

    // Sicherheitsnetz: nach Videolänge + 3s Buffer spätestens Login zeigen
    video.addEventListener('playing', () => {
      if (fallbackTimer) clearTimeout(fallbackTimer);
      fallbackTimer = setTimeout(showLogin, (video.duration || 5.83) * 1000 + 500);
    });

    // Kein Format unterstützt → direkt Login
    setTimeout(() => {
      if (!loginShown && video.readyState === 0) showLogin();
    }, 3000);

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Laden…';
      btn.disabled = true;
      setTimeout(() => { window.location.href = 'portal.html'; }, 600);
    }
  </script>
</body>
</html>
